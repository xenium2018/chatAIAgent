openapi: "3.0.0"
info:
  title: PaymentStatusHandler
  version: "1.0"
paths:
  /getPaymentStatus:
    post:
      summary: Get payment status by policy number
      description: Returns the payment status, amount due, and last payment date for a given policy number
      operationId: getPaymentStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - policyNumber
              properties:
                policyNumber:
                  type: string
                  description: The customer's policy number (e.g. POL-001)
      responses:
        "200":
          description: Payment status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  policyNumber:
                    type: string
                  status:
                    type: string
                  amount:
                    type: string
                  dueDate:
                    type: string
                  lastPayment:
                    type: string
        "404":
          description: Policy number not found
